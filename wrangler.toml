name = "portfolio-unykorn"
compatibility_date = "2024-01-01"

# KV namespace for diligence access tokens
# ---------------------------------------------------------------
# SETUP REQUIRED:
#   1. Run: npx wrangler kv namespace create DILIGENCE_TOKENS
#   2. Run: npx wrangler kv namespace create DILIGENCE_TOKENS --preview
#   3. Paste the returned IDs into the two id fields below
# ---------------------------------------------------------------
[[kv_namespaces]]
binding  = "DILIGENCE_TOKENS"
id       = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

# Pages-specific config
[env.production]
name = "portfolio-unykorn"
